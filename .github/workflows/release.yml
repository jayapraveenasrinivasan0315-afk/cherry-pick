name: Reusable Release Workflow

# Triggered after production deployment. Automatically:
#   - Resolves the next date-based version (tag: YYYYMMDD.N, title: YYYYMMDD.vN)
#   - Creates a Git tag and GitHub Release
#   - Uses GitHub's native --generate-notes to build the "What's Changed" notes
#     (PR titles + contributor usernames + full changelog link)
#   - Posts a release summary comment on each associated PR, including who
#     triggered the release and a Full Changelog comparison link
#
# Operates on the calling repository (the repo that invokes this reusable workflow).
#
# Caller example (in the consuming repo):
#   jobs:
#     release:
#       uses: your-org/infra/.github/workflows/release.yml@main
#       with:
#         app_name: Production        # optional — shown as "<app_name> Release - ..."
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_PAT }}
#
# Versioning scheme:
#   Tag:    YYYYMMDD.N   (e.g. 20260612.2)   — used for git tag + compare links
#   Title:  YYYYMMDD.vN  (e.g. 20260612.v2)  — used for the release title only
#
#   1st release on a given day  → tag 20260612.1   title "...20260612.v1"
#   2nd release same day        → tag 20260612.2   title "...20260612.v2"
#   3rd release same day        → tag 20260612.3   title "...20260612.v3"
#   Next day resets the counter → tag 20260613.1   title "...20260613.v1"
#
# Note on PR comments: PR numbers are detected by scanning commit messages for
# a "(#123)" pattern, which GitHub appends to commit subjects regardless of
# whether the repo uses squash, rebase, or merge-commit strategy. If no PRs
# are found, the pr-comment job simply skips — this is expected on the very
# first release, or for commits pushed directly without a PR.
#
# PAT required scopes:
#   repo (full) — push tags, create releases, comment on PRs

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Label shown in release title and PR comment (default: "Production")'
        required: false
        type: string
        default: "Production"
      base_branch:
        description: "Branch to tag and release from"
        required: false
        type: string
        default: "production"
      runs_on:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      GH_TOKEN:
        description: "GitHub PAT with repo scope (contents:write + pull-requests:write)"
        required: true

jobs:
  # ── 1. RESOLVE VERSION (date-based: YYYYMMDD.N) ─────────────────────────
  resolve-version:
    name: "🔢 Resolve Next Version"
    runs-on: ${{ inputs.runs_on }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      last_tag: ${{ steps.version.outputs.last_tag }}
    steps:
      - name: Checkout ${{ inputs.base_branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Resolve next date-based version
        id: version
        run: |
          TODAY=$(date +'%Y%m%d')

          # Most recent tag overall (any date) — used as the comparison
          # point for the Full Changelog link.
          LAST_TAG=$(git tag --sort=-creatordate | grep -E "^[0-9]{8}\.[0-9]+$" | head -n 1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="none"
          fi

          # Highest counter already used today, if any.
          LAST_TODAY_COUNTER=$(git tag \
            | grep -E "^${TODAY}\.[0-9]+$" \
            | sed -E "s/^${TODAY}\.//" \
            | sort -n \
            | tail -n 1 || echo "")

          if [ -z "$LAST_TODAY_COUNTER" ]; then
            NEXT_COUNTER=1
            echo "ℹ️  First release today. Starting at ${TODAY}.1"
          else
            NEXT_COUNTER=$((LAST_TODAY_COUNTER + 1))
            echo "ℹ️  Last release today : ${TODAY}.${LAST_TODAY_COUNTER}"
          fi

          NEW_VERSION="${TODAY}.${NEXT_COUNTER}"

          # Safety: if this tag already exists keep incrementing.
          while git tag | grep -q "^${NEW_VERSION}$"; do
            echo "⚠️  Tag $NEW_VERSION already exists, incrementing..."
            NEXT_COUNTER=$((NEXT_COUNTER + 1))
            NEW_VERSION="${TODAY}.${NEXT_COUNTER}"
          done

          echo "✅ Next version : $NEW_VERSION  (3rd+ same-day release just keeps counting: .1 → .2 → .3 → ...)"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

  # ── 2. CREATE TAG & GITHUB RELEASE (notes auto-generated by GitHub) ──────
  release:
    name: "🏷️ Create Tag & GitHub Release"
    runs-on: ${{ inputs.runs_on }}
    needs: resolve-version
    outputs:
      release_notes: ${{ steps.create.outputs.release_notes }}
      release_url: ${{ steps.create.outputs.release_url }}
      compare_url: ${{ steps.create.outputs.compare_url }}
      pr_numbers: ${{ steps.create.outputs.pr_numbers }}
    steps:
      - name: Checkout ${{ inputs.base_branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Create tag, release, and detect related PRs
        id: create
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
          LAST_TAG: ${{ needs.resolve-version.outputs.last_tag }}
          APP_NAME: ${{ inputs.app_name }}
          BASE: ${{ inputs.base_branch }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "🏷️ Tag pushed: $VERSION"

          # Tag stays plain (YYYYMMDD.N) for git/compare links; the title
          # gets the "v" prefix on the counter — e.g. 20260612.v2.
          DATE_PART="${VERSION%.*}"
          COUNTER_PART="${VERSION##*.}"
          TITLE="${APP_NAME} Release - ${DATE_PART}.v${COUNTER_PART}"

          # GitHub builds the "What's Changed" notes itself — PR titles,
          # contributor usernames, and the Full Changelog link, automatically.
          gh release create "$VERSION" \
            --title "$TITLE" \
            --generate-notes \
            --target "$BASE"

          echo "✅ GitHub Release created: $VERSION"

          NOTES=$(gh release view "$VERSION" --json body --jq '.body')
          URL=$(gh release view "$VERSION" --json url --jq '.url')

          if [ "$LAST_TAG" = "none" ]; then
            COMPARE_URL=""
          else
            COMPARE_URL="https://github.com/${REPO}/compare/${LAST_TAG}...${VERSION}"
          fi

          {
            echo "release_notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "release_url=$URL" >> "$GITHUB_OUTPUT"
          echo "compare_url=$COMPARE_URL" >> "$GITHUB_OUTPUT"

          # Detect related PR numbers from commit subjects — works for
          # squash, rebase, and merge-commit strategies alike.
          if [ "$LAST_TAG" = "none" ]; then
            RANGE="origin/$BASE"
          else
            RANGE="$LAST_TAG..origin/$BASE"
          fi

          PR_NUMBERS=$(git log "$RANGE" --pretty=format:'%s' 2>/dev/null \
            | grep -oP '#\K[0-9]+' | sort -un | tr '\n' ' ' || echo "")

          echo "pr_numbers=${PR_NUMBERS}" >> "$GITHUB_OUTPUT"

  # ── 3. POST PR COMMENT ──────────────────────────────────────────────────
  # Only runs for PRs detected via the "(#123)" pattern in commit subjects.
  # If commits were pushed directly without a PR, this step has nothing to
  # comment on and skips cleanly.
  pr-comment:
    name: "💬 Post PR Comment"
    runs-on: ${{ inputs.runs_on }}
    needs: [resolve-version, release]
    if: needs.release.outputs.pr_numbers != ''
    steps:
      - name: Post release comment on associated PRs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBERS: ${{ needs.release.outputs.pr_numbers }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
          RELEASE_URL: ${{ needs.release.outputs.release_url }}
          COMPARE_URL: ${{ needs.release.outputs.compare_url }}
          APP_NAME: ${{ inputs.app_name }}
          BASE: ${{ inputs.base_branch }}
          DEPLOYED_BY: ${{ github.actor }}
        run: |
          export GH_REPO="${{ github.repository }}"

          DATE_PART="${VERSION%.*}"
          COUNTER_PART="${VERSION##*.}"
          DISPLAY_VERSION="${DATE_PART}.v${COUNTER_PART}"

          COMMENT="## 🚀 Released in ${DISPLAY_VERSION}
          "
          COMMENT="${COMMENT}
          **App:** \`${APP_NAME}\`
          **Branch:** \`${BASE}\`
          **Deployed:** $(date +'%Y-%m-%d %H:%M UTC')
          **Released by:** @${DEPLOYED_BY}
          "

          if [ -n "$COMPARE_URL" ]; then
            COMMENT="${COMMENT}
          **Full Changelog:** ${COMPARE_URL}
          "
          fi

          COMMENT="${COMMENT}
          See the full release notes: ${RELEASE_URL}"

          for PR in $PR_NUMBERS; do
            echo "💬 Posting comment on PR #$PR"
            gh pr comment "$PR" --body "$COMMENT" || echo "⚠️  Could not comment on PR #$PR"
          done
