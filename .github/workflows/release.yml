name: Reusable Release Workflow

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Label shown in release title and PR comment (default: "Production")'
        required: false
        type: string
        default: "Production"
      base_branch:
        description: "Branch to tag and release from"
        required: false
        type: string
        default: "production"
      runs_on:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      GH_TOKEN:
        description: "GitHub PAT with repo scope (contents:write + pull-requests:write)"
        required: true

jobs:
  # ── 1. RESOLVE VERSION ───────────────────────────────────────────────────
  resolve-version:
    name: "🔢 Resolve Next Version"
    runs-on: ${{ inputs.runs_on }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      last_tag: ${{ steps.version.outputs.last_tag }}
      mode: ${{ steps.version.outputs.mode }}
      pr_body: ${{ steps.bump.outputs.pr_body }}
      pr_number: ${{ steps.bump.outputs.pr_number }}
    steps:
      - name: Checkout ${{ inputs.base_branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Detect bump type from latest merged PR description
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BASE: ${{ inputs.base_branch }}
          REPO: ${{ github.repository }}
        run: |
          export GH_REPO="$REPO"

          # Get latest merged PR sorted by mergedAt descending
          LATEST_PR=$(gh pr list \
            --state merged \
            --base "$BASE" \
            --limit 1 \
            --json number,body,mergedAt \
            --jq 'sort_by(.mergedAt) | reverse | .[0]')

          PR_NUMBER=$(echo "$LATEST_PR" | jq -r '.number // empty')
          PR_BODY=$(echo "$LATEST_PR" | jq -r '.body // empty')

          echo "📄 Latest merged PR: #${PR_NUMBER}"
          echo "📝 PR Body:"
          echo "$PR_BODY"

          # Detect flags from PR description (case-insensitive)
          IS_MAJOR=false
          IS_MINOR=false
          IS_PATCH=false

          if echo "$PR_BODY" | grep -iE "major[[:space:]]*=[[:space:]]*true" > /dev/null 2>&1; then
            IS_MAJOR=true
          elif echo "$PR_BODY" | grep -iE "minor[[:space:]]*=[[:space:]]*true" > /dev/null 2>&1; then
            IS_MINOR=true
          elif echo "$PR_BODY" | grep -iE "patch[[:space:]]*=[[:space:]]*true" > /dev/null 2>&1; then
            IS_PATCH=true
          fi

          echo "🔍 Detected — major=$IS_MAJOR minor=$IS_MINOR patch=$IS_PATCH"
          echo "is_major=$IS_MAJOR" >> "$GITHUB_OUTPUT"
          echo "is_minor=$IS_MINOR" >> "$GITHUB_OUTPUT"
          echo "is_patch=$IS_PATCH" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          # Pass full PR body as output (used in release notes)
          {
            echo "pr_body<<PR_BODY_EOF"
            echo "$PR_BODY"
            echo "PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve next version
        id: version
        env:
          IS_MAJOR: ${{ steps.bump.outputs.is_major }}
          IS_MINOR: ${{ steps.bump.outputs.is_minor }}
          IS_PATCH: ${{ steps.bump.outputs.is_patch }}
        run: |
          USE_SEMVER=false
          if [ "$IS_MAJOR" = "true" ] || [ "$IS_MINOR" = "true" ] || [ "$IS_PATCH" = "true" ]; then
            USE_SEMVER=true
          fi

          if [ "$USE_SEMVER" = "true" ]; then
            # Get latest semver tag
            LAST_TAG=$(git tag --sort=-v:refname \
              | grep -E "^v?[0-9]+\.[0-9]+\.[0-9]+$" \
              | head -n 1 || echo "")

            if [ -z "$LAST_TAG" ]; then
              MAJOR=0; MINOR_V=0; PATCH_V=0
              LAST_TAG="none"
            else
              CLEAN="${LAST_TAG#v}"
              MAJOR=$(echo "$CLEAN" | cut -d. -f1)
              MINOR_V=$(echo "$CLEAN" | cut -d. -f2)
              PATCH_V=$(echo "$CLEAN" | cut -d. -f3)
            fi

            if [ "$IS_MAJOR" = "true" ]; then
              MAJOR=$((MAJOR + 1)); MINOR_V=0; PATCH_V=0
              MODE="major"
            elif [ "$IS_MINOR" = "true" ]; then
              MINOR_V=$((MINOR_V + 1)); PATCH_V=0
              MODE="minor"
            else
              PATCH_V=$((PATCH_V + 1))
              MODE="patch"
            fi

            NEW_VERSION="v${MAJOR}.${MINOR_V}.${PATCH_V}"

            # Safety: keep incrementing if tag already exists
            while git tag | grep -q "^${NEW_VERSION}$"; do
              echo "⚠️  Tag $NEW_VERSION already exists, incrementing patch..."
              PATCH_V=$((PATCH_V + 1))
              NEW_VERSION="v${MAJOR}.${MINOR_V}.${PATCH_V}"
            done

            echo "✅ Semver mode ($MODE): $NEW_VERSION"

          else
            # ── Date-based fallback ──
            MODE="date"
            TODAY=$(date +'%Y%m%d')
            LAST_TAG=$(git tag --sort=-creatordate \
              | grep -E "^[0-9]{8}\.[0-9]+$" \
              | head -n 1 || echo "")

            if [ -z "$LAST_TAG" ]; then
              LAST_TAG="none"
            fi

            LAST_TODAY_COUNTER=$(git tag \
              | grep -E "^${TODAY}\.[0-9]+$" \
              | sed -E "s/^${TODAY}\.//" \
              | sort -n \
              | tail -n 1 || echo "")

            if [ -z "$LAST_TODAY_COUNTER" ]; then
              NEXT_COUNTER=1
            else
              NEXT_COUNTER=$((LAST_TODAY_COUNTER + 1))
            fi

            NEW_VERSION="${TODAY}.${NEXT_COUNTER}"

            while git tag | grep -q "^${NEW_VERSION}$"; do
              NEXT_COUNTER=$((NEXT_COUNTER + 1))
              NEW_VERSION="${TODAY}.${NEXT_COUNTER}"
            done

            echo "✅ Date-based mode: $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

  # ── 2. CREATE TAG & GITHUB RELEASE ──────────────────────────────────────
  release:
    name: "🏷️ Create Tag & GitHub Release"
    runs-on: ${{ inputs.runs_on }}
    needs: resolve-version
    outputs:
      release_url: ${{ steps.create.outputs.release_url }}
      compare_url: ${{ steps.create.outputs.compare_url }}
      pr_numbers: ${{ steps.create.outputs.pr_numbers }}
    steps:
      - name: Checkout ${{ inputs.base_branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Create tag, release, and build notes
        id: create
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
          LAST_TAG: ${{ needs.resolve-version.outputs.last_tag }}
          MODE: ${{ needs.resolve-version.outputs.mode }}
          LATEST_PR_BODY: ${{ needs.resolve-version.outputs.pr_body }}
          LATEST_PR_NUMBER: ${{ needs.resolve-version.outputs.pr_number }}
          APP_NAME: ${{ inputs.app_name }}
          BASE: ${{ inputs.base_branch }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "🏷️ Tag pushed: $VERSION"

          # Build release title based on mode
          if [ "$MODE" = "major" ]; then
            TITLE="${APP_NAME} Release - ${VERSION} (Major)"
          elif [ "$MODE" = "minor" ]; then
            TITLE="${APP_NAME} Release - ${VERSION} (Minor)"
          elif [ "$MODE" = "patch" ]; then
            TITLE="${APP_NAME} Release - ${VERSION} (Patch)"
          else
            DATE_PART="${VERSION%.*}"
            COUNTER_PART="${VERSION##*.}"
            TITLE="${APP_NAME} Release - ${DATE_PART}.v${COUNTER_PART}"
          fi

          # Detect all PR numbers in this release range
          if [ "$LAST_TAG" = "none" ]; then
            RANGE="origin/$BASE"
          else
            RANGE="$LAST_TAG..origin/$BASE"
          fi

          PR_NUMBERS=$(git log "$RANGE" --pretty=format:'%s' 2>/dev/null \
            | grep -oE '#[0-9]+' | tr -d '#' | sort -un | tr '\n' ' ' || echo "")

          echo "🔍 PRs in this release: $PR_NUMBERS"

          # ── Build PR Descriptions section ──
          PR_DESCRIPTIONS=""
          for PR in $PR_NUMBERS; do
            DESC=$(gh pr view "$PR" --json body --jq '.body' 2>/dev/null || echo "")
            if [ -n "$DESC" ] && [ "$DESC" != "null" ] && [ "$DESC" != "" ]; then
              PR_TITLE=$(gh pr view "$PR" --json title --jq '.title' 2>/dev/null || echo "PR #$PR")
              PR_DESCRIPTIONS="${PR_DESCRIPTIONS}
          ### PR #${PR} — ${PR_TITLE}
          ${DESC}

          ---
          "
            fi
          done

          # ── Create release to get auto-generated What's Changed ──
          gh release create "$VERSION" \
            --title "$TITLE" \
            --generate-notes \
            --target "$BASE"

          echo "✅ GitHub Release created: $VERSION"

          AUTO_NOTES=$(gh release view "$VERSION" --json body --jq '.body')
          URL=$(gh release view "$VERSION" --json url --jq '.url')

          # ── Combine: PR descriptions first, then What's Changed ──
          if [ -n "$PR_DESCRIPTIONS" ]; then
            FINAL_NOTES="## 📋 PR Descriptions
          ${PR_DESCRIPTIONS}
          ## 🔀 What's Changed
          ${AUTO_NOTES}"
          else
            FINAL_NOTES="${AUTO_NOTES}"
          fi

          # Update release with combined notes
          gh release edit "$VERSION" --notes "$FINAL_NOTES"

          if [ "$LAST_TAG" = "none" ]; then
            COMPARE_URL=""
          else
            COMPARE_URL="https://github.com/${REPO}/compare/${LAST_TAG}...${VERSION}"
          fi

          echo "release_url=$URL" >> "$GITHUB_OUTPUT"
          echo "compare_url=$COMPARE_URL" >> "$GITHUB_OUTPUT"
          echo "pr_numbers=${PR_NUMBERS}" >> "$GITHUB_OUTPUT"

  # ── 3. POST PR COMMENT ───────────────────────────────────────────────────
  pr-comment:
    name: "💬 Post PR Comment"
    runs-on: ${{ inputs.runs_on }}
    needs: [resolve-version, release]
    if: needs.release.outputs.pr_numbers != ''
    steps:
      - name: Post release comment on associated PRs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBERS: ${{ needs.release.outputs.pr_numbers }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
          MODE: ${{ needs.resolve-version.outputs.mode }}
          RELEASE_URL: ${{ needs.release.outputs.release_url }}
          COMPARE_URL: ${{ needs.release.outputs.compare_url }}
          APP_NAME: ${{ inputs.app_name }}
          BASE: ${{ inputs.base_branch }}
          DEPLOYED_BY: ${{ github.actor }}
        run: |
          export GH_REPO="${{ github.repository }}"

          if [ "$MODE" = "major" ] || [ "$MODE" = "minor" ] || [ "$MODE" = "patch" ]; then
            MODE_LABEL="$(echo "$MODE" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
            DISPLAY_VERSION="${VERSION} (${MODE_LABEL})"
          else
            DATE_PART="${VERSION%.*}"
            COUNTER_PART="${VERSION##*.}"
            DISPLAY_VERSION="${DATE_PART}.v${COUNTER_PART}"
          fi

          COMMENT="## 🚀 Released in ${DISPLAY_VERSION}

          **App:** \`${APP_NAME}\`
          **Branch:** \`${BASE}\`
          **Deployed:** $(date +'%Y-%m-%d %H:%M UTC')
          **Released by:** @${DEPLOYED_BY}
          "

          if [ -n "$COMPARE_URL" ]; then
            COMMENT="${COMMENT}
          **Full Changelog:** ${COMPARE_URL}
          "
          fi

          COMMENT="${COMMENT}
          See the full release notes: ${RELEASE_URL}"

          for PR in $PR_NUMBERS; do
            echo "💬 Posting comment on PR #$PR"
            gh pr comment "$PR" --body "$COMMENT" || echo "⚠️  Could not comment on PR #$PR"
          done
